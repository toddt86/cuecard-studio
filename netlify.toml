# Netlify build config.
#
# Site/base/publish settings stay in the Netlify dashboard. This file only
# configures function bundling.
#
# Why external_node_modules: esbuild (the v2 ESM bundler used for .mjs
# functions) tries to inline every import into the output file. firebase-admin
# has dynamic requires and native gRPC bindings that do not survive bundling.
# Listing it as external tells esbuild to leave the import alone and makes
# Netlify copy the installed node_modules/firebase-admin alongside the
# function, so it resolves at runtime.
#
# We do NOT set node_bundler = "esbuild" globally because the CJS v1 functions
# (clean-script.js, stripe-webhook.js, etc.) already work under the default
# bundler and we do not want to risk breaking them.
[functions]
  external_node_modules = ["firebase-admin"]
